# Phase 5 cutover deploy.
#
# Disabled until you flip the switch — manual trigger only via workflow_dispatch.
# When ready, also enable GitHub Pages for this repo (Settings -> Pages ->
# Source: GitHub Actions).
#
# Two cutover paths:
#   (a) Move this repo to be jato.github.io itself (rename via Settings).
#       The site will be served at https://jato.github.io/.
#   (b) Keep this repo as jato-revamp. The site will be served at
#       https://jato.github.io/jato-revamp/ — set astro.config.mjs `base`
#       to '/jato-revamp/' before enabling.

name: Deploy

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
